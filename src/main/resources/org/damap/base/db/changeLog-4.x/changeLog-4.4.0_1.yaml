databaseChangeLog:
  - changeSet:
      id: 21
      author: Geoffrey Karnbach
      # This changeset used to include postgres only code
      # It was removed using validCheckSum, since some systems already deployed the old changeset
      validCheckSum:
        - 9:eb65b4b53c688a6b504e5b864e575b5b
      changes:
        - createSequence:
            sequenceName: technical_resource_seq
            startValue: 1
            incrementBy: 1

        - createTable:
            tableName: technical_resource
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: dataset_id
                  type: BIGINT
                  constraints:
                      nullable: false

        - createSequence:
            sequenceName: technical_resource_aud_seq
            startValue: 1
            incrementBy: 1

        - createTable:
            tableName: technical_resource_aud
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: rev
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: revtype
                  type: TINYINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: dataset_id
                  type: BIGINT

        - addPrimaryKey:
            tableName: technical_resource_aud
            columnNames: id, rev


      rollback:
        - dropTable:
            tableName: technical_resource
        - dropSequence:
            sequenceName: technical_resource_seq
        - dropTable:
            tableName: technical_resource_aud
        - dropSequence:
            sequenceName: technical_resource_aud_seq