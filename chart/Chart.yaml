apiVersion: v2
name: damap-chart
description: A tool to create machine-actionable data management plans.
type: application

version: 0.1.0-rc.2
appVersion: "5.0.0-rc.2"

kubeVersion: ">=1.25.0"

home: https://damap.org
sources:
  - https://github.com/damap-org/damap-backend
  - https://github.com/damap-org/damap-frontend

keywords:
  - damap
  - data-management
  - dmp
  - research
  - pure
  - keycloak
  - oidc
  - openid

maintainers:
  - name: DAMAP Team
    email: info@damap.org

icon: https://damap.org/logo.svg

annotations:
  artifacthub.io/prerelease: "true"
  artifacthub.io/changes: |
    - kind: added
      description: Support per-tenant configuration
    - kind: added
      description: Specify resource requests and limits for the multitenant-db-check init container
    - kind: added
      description: Introduce configurable storage size for database persistence
    - kind: added
      description: Introduce hostPath based persistence mode for local development deployments
    - kind: changed
      description: Bump DAMAP backend version to 5.0.0-rc.2
    - kind: changed
      description: Bump DAMAP frontend version to 5.0.0-rc.2
    - kind: fixed
      description: Safely transform ImageStreamTag names for OpenShift custom builds
    - kind: fixed
      description: Use correct Keycloak values tlsClusterIssuer and ingressClass in the ingress template
    - kind: fixed
      description: Ensure DAMAP secret is created before deployment
    - kind: fixed
      description: Fix multitenancy initialization database timeouts
    - kind: fixed
      description: Correct UID for mock Pure contributor in the default values
    - kind: fixed
      description: Fix multitenant configuration structure to match expected format
    - kind: fixed
      description: Fix routing when keycloak is deployed on the same domain as the frontend
    - kind: fixed
      description: Fix persistence behavior for PVC and StorageClass handling (hostPath vs dynamic provisioning)
    - kind: removed
      description: Remove unused FITS environment variable from DAMAP backend deployment
