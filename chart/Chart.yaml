apiVersion: v2
name: damap-chart
description: A tool to create machine-actionable data management plans.
type: application

version: 0.1.0-rc.2
appVersion: "5.0.0-rc.2"

kubeVersion: ">=1.25.0"

home: https://damap.org
sources:
  - https://github.com/damap-org/damap-backend
  - https://github.com/damap-org/damap-frontend

keywords:
  - damap
  - data-management
  - dmp
  - research
  - pure
  - keycloak
  - oidc
  - openid

maintainers:
  - name: DAMAP Team
    email: info@damap.org

icon: https://damap.org/logo.svg

annotations:
  artifacthub.io/prerelease: "true"
  artifacthub.io/changes: |
    - kind: added
      description: Support per-tenant configuration
    - kind: added
      description: Introduce configurable storage size for persistent volumes
    - kind: added
      description: Add host path persistence mode for local development deployments

    - kind: changed
      description: Bump DAMAP backend and frontend to 5.0.0-rc.2

    - kind: fixed
      description: Safely transform ImageStreamTag names for OpenShift custom builds
    - kind: fixed
      description: Use correct Keycloak values tlsClusterIssuer and ingressClass in the ingress template
    - kind: fixed
      description: Ensure the DAMAP secret is created before deployment
    - kind: fixed
      description: Fix multitenancy initialization database timeouts (use a more robust init container approach)
    - kind: fixed
      description: Use correct UID for mock Pure contributor in the default values
    - kind: fixed
      description: Fix routing when keycloak is deployed on the same domain as the frontend
    - kind: fixed
      description: Improve persistence configuration (hostPath vs dynamic provisioning)

    - kind: removed
      description: Remove obsolete FITS environment variable from the backend deployment configuration
