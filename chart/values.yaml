debug: true
openshift: false

# Create a custom backend/frontend build using the OpenShift CI pipeline.
# Sadly, this doesn't work in vanilla Kubernetes.
customBuild:
  backend:
    name: ""
    ref: next
    repo: https://github.com/damap-org/damap-backend
  frontend:
    name: ""
    ref: next
    repo: https://github.com/damap-org/damap-frontend

damap:
  backendVersion: 5.0.0-rc.1
  customDomain: false
  dbName: damap
  # NOTE: When db_password is empty, Helm will try to reuse the existing Secret if present.
  # In a KinD setup, if the Secret is deleted (e.g., on 'helm delete') but the DB volume persists,
  # a new password will be generated.
  # This mismatch can cause DB/service failures. Use a fixed password or pre-created Secret to ensure stability.
  dbPassword: "damap_pass" # Empty defaults to auto-generate.
  dbUser: damap
  frontendVersion: 5.0.0-rc.1
  # Host folder to persist data for demo / small scale deployments.
  # NOTE: Do not use for production!
  hostFolder: /tmp/damap
  hostname: localhost
  ingressClass: ""
  multitenancy:
    autoCreateDatabases: false
    enabled: false
    tenants:
      - tenant_1
      - tenant_2
  persistData: false
  personServices:
    # Elsevier Pure integration (pure.enabled must be true for this to work):
    # NOTE: PURE must come before ORCID here, otherwise the ORCID will always be used.
    - display-text: "Pure"
      query-value: "PURE"
      class-name: "org.damap.base.integration.pure.PurePersonService"
    - display-text: "ORCID"
      query-value: "ORCID"
      class-name: "org.damap.base.integration.orcid.ORCIDPersonServiceImpl"
  projectsService: elsevier-pure
  protocol: http
  storageClassName: ""
  tlsClusterIssuer: ""
  useExistingSecret: false

frontend:
  # Set this to true to provide your logo in SVG format (base64-encoded) here. Note that
  # the two logos together must not exceed 1 MB in size.
  customize: false
  logo: ""
  logoCropped: ""

keycloak:
  # Defaults to auto-generated, check the keycloak secret for the password after deployment.
  adminPassword: ""
  adminUser: admin
  customDomain: false
  dbName: keycloak
  dbPassword: "keycloak123" # Empty defaults to auto-generate
  dbUser: keycloak
  # Set this to false in order to use your own OIDC server:
  deploy: true
  # Host folder to persist data for demo / small scale deployments.
  # NOTE: Do not use for production!
  hostFolder: /tmp/keycloak
  hostname: localhost
  ingressClass: ""
  persistData: false
  protocol: http
  storageClassName: ""
  tlsClusterIssuer: ""
  useExistingSecret: false

oidc:
  # Role name used to identify DAMAP super admins
  adminRoleName: Damap Admin
  # User claim that holds affiliations
  affiliationsClaim: affiliation
  # The OIDC client ID
  clientId: damap
  # User claim that holds the email
  emailClaim: email
  # User claim that holds the family name
  familyNameClaim: family_name
  # User claim that holds the given name
  givenNameClaim: given_name
  # The endpoint the DAMAP frontend should use from the browser.
  # This should be accessible from the user's computer.
  # NOTE: This setting will be ignored if keycloak.deploy is true.
  issuer: https://...
  # User claim that holds the full name
  nameClaim: name
  # OIDC scopes
  scope:
    - openid
    - profile
    - email
    - offline_access
    - microprofile-jwt
    - roles
    - personID
  # The endpoint the DAMAP backend should use.
  # Typically, this is the same as the issuer, but sometimes
  # you may want to route the backend requests over a different network.
  # NOTE: This setting will be ignored if keycloak.deploy is true.
  serverUrl: https://...
  # Claim for the user ID
  userIdClaim: personID
  # Claim for the user roles
  userRolesClaimPath: realm_access/roles

pure:
  apiKey: ...
  backend: file # Set to "http" to use the real API
  # Provide the classification values for the project description and project lead role here:
  descriptionClassification: "/dk/atira/pure/..."
  # Enable the Elsevier Pure integration.
  enabled: true
  # The API endpoint to use. This should be the base URL, e.g., "https://your-pure-instance.com/api".
  endpoint: https://...
