{{- if .Values.damap.multitenancy.enabled }}
{{- $tenants := keys .Values.damap.multitenancy.tenants }}

{{- /* Build tenant-configs map */}}
{{- $tenantConfigs := dict }}
{{- range $tenants }}
{{- $_ := set $tenantConfigs . (index $.Values.damap.multitenancy.tenants .) }}
{{- end }}

{{- /* Build datasource map */}}
{{- $datasources := dict }}
{{- range $tenants }}
{{- $_ := set $datasources . (dict
  "jdbc" (dict
    "url" (printf "jdbc:postgresql://damap-db:5432/%s" .)
    "driver" "org.postgresql.Driver"
  )
  "db-kind" "postgresql"
  "username" "${QUARKUS_DATASOURCE_USERNAME}"
  "password" "${QUARKUS_DATASOURCE_PASSWORD}"
) }}
{{- end }}

{{- /* Build liquibase map */}}
{{- $liquibase := dict }}
{{- range $tenants }}
{{- $_ := set $liquibase . (dict
  "migrate-at-start" true
  "change-log" "org/damap/base/db/changeLog-root.yaml"
) }}
{{- end }}

{{- /* Final structure */}}
{{- $config := dict
  "damap" (dict
    "tenants" (dict
      "tenant-list" (join "," $tenants)
      "tenant-configs" $tenantConfigs
    )
  )
  "%multitenant" (dict
    "quarkus" (dict
      "datasource" $datasources
      "liquibase" $liquibase
    )
  )
}}

---
apiVersion: v1
kind: Secret
metadata:
  name: damap-tenants
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: damap
stringData:
  tenants.yaml: |-
  {{ toYaml $config | nindent 4 }}
{{- end }}
