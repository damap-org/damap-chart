{{- /*
Creates a Job on install/upgrade to auto-create missing databases when multitenancy is enabled.
*/}} 

{{- if and .Values.damap.multitenancy.enabled .Values.damap.multitenancy.autoCreateDatabases }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: damap-multitenancy-db-init
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: damap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-db
          image: postgres:16
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: damap
                  key: dbPassword
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 256Mi
          command:
            - sh
            - -c
            - |
              set -e
              echo "Starting tenant database initialization."
              echo ""

              MAX_RETRIES=30
              RETRY_INTERVAL=2
              ATTEMPT=1

              echo "Waiting for Postgres to become available..."

              until psql -h damap-db \
                        -U {{ $.Values.damap.dbUser }} \
                        -d postgres \
                        -c '\q' >/dev/null 2>&1
              do
                if [ $ATTEMPT -ge $MAX_RETRIES ]; then
                  echo "ERROR: Postgres did not become ready in time."
                  exit 1
                fi

                echo "Postgres not ready yet (attempt $ATTEMPT/$MAX_RETRIES)..."
                ATTEMPT=$((ATTEMPT+1))
                sleep $RETRY_INTERVAL
              done

              {{- range $tenant := .Values.damap.multitenancy.tenants }}
              echo "Checking database '{{ $tenant }}'."

              if psql -h damap-db \
                      -U {{ $.Values.damap.dbUser }} \
                      -d postgres \
                      -tc "SELECT 1 FROM pg_database WHERE datname='{{ $tenant }}'" \
                | grep -q 1; then

                echo "Database '{{ $tenant }}' already exists. Skipping."

              else
                echo "Database '{{ $tenant }}' does not exist, creating it now."
                psql -h damap-db \
                    -U {{ $.Values.damap.dbUser }} \
                    -d postgres \
                    -c "CREATE DATABASE {{ $tenant }} OWNER {{ $.Values.damap.dbUser }}"

                echo "Database '{{ $tenant }}' successfully created."
              fi

              echo ""
              {{- end }}

              echo "Tenant database initialization finished."
{{- end }}
