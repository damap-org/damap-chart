name: CI

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  test-helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install KinD
        run: |
          set -euo pipefail
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.29.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

      - name: Provision KinD cluster
        run: |
          set -euo pipefail
          ./scripts/create-test-cluster.sh

      - name: Deploy Helm chart
        run: |
          set -euo pipefail
          cd chart
          helm install damap ./ --values values.yaml

      - name: Run health check
        run: |
          set -euo pipefail
          max_attempts=8
          sleep_interval=2

          for i in $(seq 1 $max_attempts); do
            response=$(curl -s -w "%{http_code}" -o /dev/null http://localhost/api/config)
            if [ "$response" == "200" ]; then
              echo "Backend is healthy after $i attempts."
              exit 0
            fi
            echo "Backend not healthy (status code: $response). Retrying in ${sleep_interval}s..."
            sleep $sleep_interval
            sleep_interval=$((sleep_interval * 2)) # Exponential backoff
          done

          echo "Health check failed after $max_attempts attempts."
          exit 1
