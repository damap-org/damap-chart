name: Release Helm Chart (Dev)

env:
  REGISTRY: ghcr.io

on:
  push:
    branches:
      - helm/dev
    paths:
      - "helm/Chart.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  helm-publish-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Validate dev version
        id: validate
        run: |
          VERSION=$(grep '^version:' helm/Chart.yaml | awk '{print $2}')

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$ ]]; then
            echo "❌ Invalid dev version: $VERSION"
            echo "Expected format: x.y.z-dev.N (e.g. 0.1.0-dev.3)"
            exit 1
          fi

          echo "base_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if base dev version already exists (published)
        run: |
          set -e
          BASE_VERSION="${{ steps.validate.outputs.base_version }}"
          CHART=$(grep '^name:' helm/Chart.yaml | awk '{print $2}')
          REPO="oci://${{ env.REGISTRY }}/${{ github.repository_owner }}"

          # Strip +hash to get the base dev version
          BASE_DEV_VERSION="${BASE_VERSION%%+*}"

          echo "Checking if base dev version $BASE_DEV_VERSION already exists."

          # Fail if the same base dev number was already released
          if helm pull "$REPO/$CHART" --version "$BASE_DEV_VERSION" > /dev/null 2>&1; then
            echo "❌ Base dev version $BASE_DEV_VERSION already exists! Bump the dev number."
            exit 1
          else
            echo "✅ Base dev version $BASE_DEV_VERSION does not exist, safe to proceed."
          fi

      - name: Compute full version
        id: version
        run: |
          HASH=$(git rev-parse --short=7 HEAD)
          FULL_VERSION="${{ steps.validate.outputs.base_version }}+${HASH}"

          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $FULL_VERSION"

          sed -i "s/^version: .*/version: $FULL_VERSION/" helm/Chart.yaml

      - name: Get chart name
        id: chart
        run: |
          NAME=$(grep '^name:' helm/Chart.yaml | awk '{print $2}')
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Helm Lint
        run: helm lint helm/

      - name: Package Helm chart
        run: helm package helm/ --destination ./

      - name: Push Helm Chart to GHR
        run: |
          helm push ${{ steps.chart.outputs.name }}-${{ steps.version.outputs.version }}.tgz \
          oci://${{ env.REGISTRY }}/${{ github.repository_owner }}
