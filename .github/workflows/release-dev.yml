name: Release Helm Chart (Dev)

env:
  REGISTRY: ghcr.io

on:
  push:
    branches:
      - dev
    paths:
      - "chart/Chart.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      base_version: ${{ steps.check.outputs.base_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Precheck
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            if [ "$(git rev-list --count HEAD)" -lt 2 ]; then
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if git diff --quiet HEAD~1 HEAD -- chart/Chart.yaml; then
              echo "No chart change in latest commit."
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          VERSION=$(awk '/^version:/ {print $2}' chart/Chart.yaml)
          CHART=$(awk '/^name:/ {print $2}' chart/Chart.yaml)

          if [[ ! "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-dev\.([0-9]+)$ ]]; then
            echo "Not a dev chart version ($VERSION), skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_DEV="${BASH_REMATCH[4]}"
          echo "Current version: $VERSION"

          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"

          TAGS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /orgs/damap-org/packages/container/${CHART}/versions \
            --jq '.[].metadata.container.tags[]' || true)

          LATEST_DEV=$(
            echo "$TAGS" \
              | grep -oE '[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+' || true \
              | sed -E 's/.*-dev\.([0-9]+)/\1/' \
              | sort -n \
              | tail -1
          )

          LATEST_DEV=${LATEST_DEV:-0}

          if [[ -z "${LATEST_DEV}" ]]; then
            echo "No previous dev versions found, treating as first dev release."
            LATEST_DEV=0
          fi

          echo "Latest published dev number: $LATEST_DEV"

          if [ "$CURRENT_DEV" -le "$LATEST_DEV" ]; then
            echo "Dev number did not increase."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "base_version=$VERSION" >> "$GITHUB_OUTPUT"

  helm-publish-dev:
    needs: precheck
    if: needs.precheck.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Login to registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ${{ env.REGISTRY }} \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Compute full version
        id: version
        run: |
          HASH=$(git rev-parse --short=7 HEAD)
          FULL_VERSION="${{ needs.precheck.outputs.base_version }}+${HASH}"

          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"

          sed -i "s/^version: .*/version: $FULL_VERSION/" chart/Chart.yaml

      - name: Get chart name
        id: chart
        run: |
          NAME=$(awk '/^name:/ {print $2}' chart/Chart.yaml)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Helm lint
        run: helm lint chart/

      - name: Package chart
        run: helm package chart/ --destination ./

      - name: Push chart
        run: |
          helm push \
            ${{ steps.chart.outputs.name }}-${{ steps.version.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}
